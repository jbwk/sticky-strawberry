const ASSETS = {
  images: {
    background:             'assets/images/background.jpg',
    logo:                   'assets/images/logo.png',
    strawberry_title:       'assets/images/strawberry_title.png',
    strawberry_ceiling:     'assets/images/strawberry_ceiling.png',
    strawberry_tap:         'assets/images/strawberry_tap.png',

    strawberry_caught:      'assets/images/strawberry_caught.png',

    snapshot_2:             'assets/images/snapshot_2.jpg',
    snapshot_3:             'assets/images/snapshot_3.jpg',
    pillow:                 'assets/images/pillow.png',
    basket:                 'assets/images/basket.png',
    teddybear:              'assets/images/teddybear.png',

    lyric_05:         'assets/audio/lyric_line_05.mp3',
    lyric_06:         'assets/audio/lyric_line_06.mp3',
    lyric_07:         'assets/audio/lyric_line_07.mp3',
    lyric_08:         'assets/audio/lyric_line_08.mp3',
    tap_squish:       'assets/audio/tap_squish.mp3',
    sticky_peel:      'assets/audio/sticky_peel.mp3',
    falling_whistle:  'assets/audio/falling_whistle.mp3',
    pillow_bounce:    'assets/audio/pillow_bounce.mp3',
    basket_pop:       'assets/audio/basket_pop.mp3',
    teddy_hug:        'assets/audio/teddy_hug.mp3',
    head_boop:        'assets/audio/head_boop.mp3',
    giggle:           'assets/audio/giggle.mp3',
    bedtime_chime:    'assets/audio/bedtime_chime.mp3',
  }
};

// ─────────────────────────────────────────────
// LYRICS
// ─────────────────────────────────────────────
const LYRICS = [
  'Sticky strawberry, sticky strawberry',
  'When will you fall down?',
  'Sticky strawberry, oh sticky strawberry',
  'Where will you fall down?',
  'Will you come down soon?',
  'Will I be in bed?',
  'Will I be asleep',

// ─────────────────────────────────────────────
// CANVAS / SCALE
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const VW = 390, VH = 844;
let scale = 1, offX = 0, offY = 0;

function resize() {
  const sw = window.innerWidth / VW;
  const sh = window.innerHeight / VH;
  scale = Math.min(sw, sh);
  canvas.width  = Math.round(VW * scale);
  canvas.height = Math.round(VH * scale);
  offX = (window.innerWidth  - canvas.width)  / 2;
  offY = (window.innerHeight - canvas.height) / 2;
  canvas.style.cssText = `position:absolute;left:${offX}px;top:${offY}px;width:${canvas.width}px;height:${canvas.height}px`;
}
window.addEventListener('resize', () => { resize(); checkOrientation(); });
resize();

// ─────────────────────────────────────────────
// ORIENTATION
// ─────────────────────────────────────────────
const landEl = document.getElementById('landscape');
function checkOrientation() {
  landEl.classList.toggle('show', window.innerWidth > window.innerHeight);
}
checkOrientation();

// ─────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────
const inp = { pressed: false, x: 0, y: 0, tap: false, tx: 0, ty: 0 };

function toV(cx, cy) { return { x: (cx - offX) / scale, y: (cy - offY) / scale }; }

function titleBerryPos() {
  // Berry resting position on title screen (used for hit-test and idle draw)
  return { x: VW/2 + Math.sin(title.wp)*13, y: VH*0.63 + Math.sin(title.wp*0.65)*5 };
}

function onStart(cx, cy) {
  const v = toV(cx, cy);
  inp.pressed = true; inp.x = v.x; inp.y = v.y;
  audioUnlock();
  if (state === S.TITLE) startMusic();
  // The berry is grabbable/throwable on the title screen and after a catch (celebration)
  if (state === S.TITLE || state === S.CELEBRATION) {
    const bp = (state === S.CELEBRATION) ? { x: berry.x, y: berry.y } : titleBerryPos();
    if (Math.hypot(v.x - bp.x, v.y - bp.y) < berry.r * 1.8) {
      titleDrag = true;
      velHist = [{ x: v.x, y: v.y, t: performance.now() }];
    } else {
      inp.tap = true; inp.tx = v.x; inp.ty = v.y;
    }
  } else {
    inp.tap = true; inp.tx = v.x; inp.ty = v.y;
  }
}
function onMove(cx, cy) {
  if (!inp.pressed) return;
  const v = toV(cx, cy);
  inp.x = v.x; inp.y = v.y;
  if (titleDrag) {
    velHist.push({ x: v.x, y: v.y, t: performance.now() });
    if (velHist.length > 24) velHist.shift();
  }
}
function onEnd() {
  inp.pressed = false;
  if (titleDrag && (state === S.TITLE || state === S.CELEBRATION)) {
    titleDrag = false;
    // Measure the release swipe (last ~90ms of movement)
    const now = performance.now();
    const recent = velHist.filter(h => now - h.t < 90);
    let rvx = 0, rvy = 0;
    if (recent.length >= 2) {
      const f = recent[0], l = recent[recent.length - 1];
      const dt = (l.t - f.t) / 1000;
      if (dt > 0.008) {
        rvx = (l.x - f.x) / dt;
        rvy = (l.y - f.y) / dt;   // negative = upward
      }
    }
    const last = velHist[velHist.length - 1] || { x: berry.x, y: berry.y };
    if (rvy <= -THROW_MIN) {
      // Genuine upward swipe → throw with its real strength.
      // Weak throws won't reach the ceiling and will fall back for another try.
      title.tx     = Math.max(berry.r, Math.min(VW - berry.r, last.x));
      title.ty     = Math.min(VH * 0.78, last.y);
      title.startY = title.ty;
      title.tvx    = Math.max(-350, Math.min(350, rvx));
      title.tvy    = Math.max(-2600, rvy);
      title.trot   = rvx * 0.0003;
      title.tphase = 'flying';
      title.ttime  = 0;
      title.tsx = 1; title.tsy = 1;
      startMusic();
      state = S.THROWING;
    } else {
      // Just a tap (no real throw) → pulse for feedback, stay on title
      title.pulse = PULSE_DUR;
      play('tap_squish');
    }
  }
  titleDrag = false;
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; onStart(t.clientX, t.clientY); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); const t = e.changedTouches[0]; onMove(t.clientX, t.clientY);  }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); onEnd(); }, { passive: false });
canvas.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup',    onEnd);

// ─────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────
let soundOn = localStorage.getItem('sound') !== 'false';
let musicVol = parseFloat(localStorage.getItem('musicVol') ?? '0.7');
let musicStarted = false;
let audioReady = false;
const audioEl = {};
let actx = null;   // Web Audio context for synthesized sound effects

function audioUnlock() {
  if (audioReady) return;
  audioReady = true;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
  } catch(e) { actx = null; }
}

function loadAudio(key) {
  const path = ASSETS.audio[key];
  if (!path) return;
  const el = new Audio();
  el.preload = 'auto'; el.src = path;
  try { el.load(); } catch(e) {}
  audioEl[key] = el;
}

// ── Synthesized sound effects (lightweight, no files) ──
function tone({freq, freq2, dur=0.15, type='sine', vol=0.25, delay=0, attack=0.006}) {
  if (!actx || !soundOn) return;
  const t0 = actx.currentTime + delay;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (freq2) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq2), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(actx.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.03);
}

function noise({dur=0.15, vol=0.15, delay=0, hp=0, lp=0}) {
  if (!actx || !soundOn) return;
  const t0 = actx.currentTime + delay;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const src = actx.createBufferSource(); src.buffer = buf;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  let head = src;
  if (hp || lp) {
    const f = actx.createBiquadFilter();
    f.type = hp ? 'highpass' : 'lowpass';
    f.frequency.value = hp || lp;
    src.connect(f); head = f;
  }
  head.connect(g).connect(actx.destination);
  src.start(t0); src.stop(t0 + dur + 0.02);
}

function sfx(key) {
  switch (key) {
    case 'tap_squish':      tone({freq:470, freq2:230, dur:0.11, type:'sine',     vol:0.42});
                            tone({freq:240, freq2:140, dur:0.11, type:'triangle', vol:0.20}); break;
    case 'sticky_peel':     tone({freq:190, freq2:640, dur:0.28, type:'sawtooth', vol:0.30});
                            noise({dur:0.24, vol:0.12, hp:1200}); break;
    case 'falling_whistle': // dramatic descending whistle — two layered sweeps + a tail
                            tone({freq:1500, freq2:140, dur:0.75, type:'sine',     vol:0.5 });
                            tone({freq:750,  freq2:90,  dur:0.75, type:'triangle', vol:0.22});
                            tone({freq:2250, freq2:210, dur:0.5,  type:'sine',     vol:0.12, delay:0.04}); break;
    case 'pillow_bounce':   tone({freq:180, freq2:80,  dur:0.24, type:'sine',     vol:0.5 });
                            tone({freq:360, freq2:160, dur:0.12, type:'triangle', vol:0.18}); break;
    case 'basket_pop':      tone({freq:720, freq2:400, dur:0.1,  type:'square',   vol:0.32});
                            noise({dur:0.06, vol:0.16, hp:2000}); break;
    case 'teddy_hug':       tone({freq:330, dur:0.34, type:'sine', vol:0.30});
                            tone({freq:415, dur:0.34, type:'sine', vol:0.24, delay:0.03});
                            tone({freq:494, dur:0.34, type:'sine', vol:0.18, delay:0.06}); break;
    case 'head_boop':       tone({freq:560, freq2:150, dur:0.16, type:'sine',     vol:0.55});
                            tone({freq:280, freq2:90,  dur:0.16, type:'square',   vol:0.16}); break;
    case 'giggle':          [0,0.09,0.18,0.27].forEach((d,i)=>
                              tone({freq:520+i*55, freq2:660+i*55, dur:0.09, type:'triangle', vol:0.26, delay:d})); break;
    case 'bedtime_chime':   [784,659,523].forEach((f,i)=>   // descending — "game over"
                              tone({freq:f, dur:0.7, type:'sine', vol:0.26, delay:i*0.16})); break;
    case 'catch_chime':     [523,659,784,1047].forEach((f,i)=>  // ascending — happy catch
                              tone({freq:f, dur:0.32, type:'triangle', vol:0.24, delay:i*0.07})); break;
    case 'record_fanfare':  [784,988,1175,1568].forEach((f,i)=> // bright high run — new high score
                              tone({freq:f, dur:0.4, type:'triangle', vol:0.26, delay:0.1+i*0.08})); break;
  }
}

function play(key) {
  if (key === 'song') return;   // the song is driven by startMusic()
  sfx(key);
}

function stop(key) {
  const el = audioEl[key];
  if (el) { el.pause(); el.currentTime = 0; }
}

function fadeOut(key, ms = 1200) {
  const el = audioEl[key];
  if (!el || el.paused) return;
  const start = el.volume;
  let t = 0;
  const id = setInterval(() => {
    t += 60;
    el.volume = Math.max(0, start * (1 - t / ms));
    if (t >= ms) { clearInterval(id); el.pause(); el.currentTime = 0; el.volume = start; }
  }, 60);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    Object.values(audioEl).forEach(e => { if (!e.paused) { e._was = true; e.pause(); } });
  } else if (soundOn) {
    if (actx && actx.state === 'suspended') actx.resume();
    Object.values(audioEl).forEach(e => { if (e._was) { e.play().catch(()=>{}); e._was = false; } });
  }
});

function startMusic() {
  if (!audioReady || musicStarted) return;
  musicStarted = true;
  const el = audioEl['song'];
  if (!el) return;
  el.loop = true;
  el.volume = soundOn ? musicVol : 0;
  el.play().catch(() => {});
}

// Preload the background song (sound effects are synthesized, no files needed)
loadAudio('song');

// ─────────────────────────────────────────────
// PALETTE
// ─────────────────────────────────────────────
const C = {
  nightBg: '#1a0a2e', nightBg2: '#2d1b4e',
  wall: '#f5e6d0', wallDark: '#e8d5b5',
  // Style-guide palette
  pink: '#ff8fab', red: '#DC3545', darkRed: '#b01c2a',
  cream: '#FFF0E0', paleBlue: '#A8C8E8', lavender: '#C9B1D0',
  blushPink: '#F4A0A8',
  green: '#52b788', darkGreen: '#2D6A4F',
  yellow: '#ffd166', orange: '#f4a261',
  goo: '#FF4D94', star: '#FFE066',
  brown: '#C8956C', purpleBow: '#9B59B6',
  leafDark: '#2D6A4F', leafMid: '#52B788',
};

// Bubbly font helper — use F(size) wherever ctx.font is set
const F = sz => `${sz}px "Fredoka One", cursive`;

// ─────────────────────────────────────────────
// GAME STATE ENUM
// ─────────────────────────────────────────────
const S = { TITLE:'title', THROWING:'throwing', PLAYING:'playing', FALLING:'falling', LANDING:'landing', CELEBRATION:'celebration', BEDTIME:'bedtime' };
let state = S.TITLE;

// ─────────────────────────────────────────────
// REDUCED MOTION
// ─────────────────────────────────────────────
const noAnim = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ─────────────────────────────────────────────
// GAME OBJECTS
// ─────────────────────────────────────────────
const CEIL_Y = 108;        // ceiling y — clear of Dynamic Island safe area
const CATCHER_SPEED = 150; // px/s — sideways sweep speed of the catcher
const WIG_DUR = 0.55;      // duration (s) of an occasional ceiling wiggle
const THROW_MIN = 500;     // min upward swipe speed (px/s) to count as a throw vs a tap
const PULSE_DUR = 0.4;     // duration (s) of the tap pulse on the title berry

const berry = {
  x:0, y:0, bx:0, by:0,           // current & base position
  r:38,                             // radius (smaller = real catching stakes)
  wp:0, wa:8, wig:0,                // wobble phase / amplitude / wiggle timer
  sx:1, sy:1,                       // squash x/y
  rot:0, vx:0, vy:0,
  taps:0, need:4,                   // tap progress
  glow:0, sqTimer:0,
  face:{ eo:1, sm:1 },             // eye-open, smile-size
};

const catcher = {
  x: VW/2, y: 720,
  w: 132, hw: 100,                  // travel-clamp width / catch tolerance (≈ visible catcher width)
  h: 40, type:'pillow',
  vx: CATCHER_SPEED,                // sideways velocity (auto-sweep)
  bounce:0, hug:false,
};

let goo = [];        // goo strand objects
let parts = [];      // particles
let stars = [];      // background stars
let uiBtns = [];     // hit-test buttons built each frame

// Celebration
let celeb = { type:'', showBtns:false, timer:0 };

// Bedtime
let bed = { dim:0, going:false };

// Sing-along
let sing = { on:false, line:-1, timer:0, dur:3.2 };

// Title
let title = { alpha:0, wp:0, pulse:0 };
let titleDrag = false;   // player is holding the berry on title screen
let velHist   = [];      // [{x,y,t}] recent positions for throw velocity

// Timing
let T = 0, dT = 0, lastTs = 0, round = 0;

// Catch streak (consecutive clean catches)
let streak = 0, streakPop = 0;
let bestStreak = parseInt(localStorage.getItem('bestStreak') || '0', 10);
let recordBeaten = false;   // true once this run has broken the previous best

// ─────────────────────────────────────────────
// INIT / ROUND SETUP
// ─────────────────────────────────────────────
function initStars() {
  stars = [];
  // Place stars inside the window area (approx x 60–330, y 45–335)
  for (let i = 0; i < 38; i++) {
    stars.push({
      x: 65 + Math.random() * 260,
      y: 48 + Math.random() * 275,
      r: 0.6 + Math.random() * 1.8,
      phase: Math.random() * Math.PI * 2,
      speed: 0.008 + Math.random() * 0.018,
    });
  }
}

function newRound(throwX, throwRot) {
  round++;
  berry.need  = 2 + Math.floor(Math.random() * 9);  // 2–10 taps (surprise!)
  berry.taps  = 0;
  // Keep the resting column within the catcher's reach so a catch is always possible
  const reachMin = catcher.w/2 + 8, reachMax = VW - catcher.w/2 - 8;
  berry.bx    = throwX !== undefined
    ? Math.max(reachMin, Math.min(reachMax, throwX))
    : VW/2 + (Math.random()-.5)*80;
  berry.by    = CEIL_Y;  // pressed against the ceiling
  berry.x     = berry.bx; berry.y = berry.by;
  berry.wp    = Math.random()*Math.PI*2;
  berry.wa    = 8; berry.sx = 1; berry.sy = 1;
  berry.rot   = throwRot || 0; berry.vx = 0; berry.vy = 0;
  berry.glow  = 0; berry.sqTimer = 0; berry.peeling = false;
  berry.face  = { eo:1, sm:1 };

  const types = ['pillow','basket','teddy'];
  catcher.type   = types[round % 3];
  catcher.x      = VW/2;
  catcher.vx     = (Math.random()<0.5?-1:1) * CATCHER_SPEED;  // sweep starts in a random direction
  catcher.bounce = 0;
  catcher.hug    = false;

  // Build goo strands
  goo = [];
  for (let i = 0; i < berry.need; i++) {
    goo.push({
      x: berry.bx + (i - (berry.need-1)/2) * 22,
      broken: false, bt: 0,          // break-time
    });
  }

  parts = [];
  celeb  = { type:'', showBtns:false, timer:0 };
  state  = S.PLAYING;
}

// ─────────────────────────────────────────────
// DRAWING HELPERS
// ─────────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// 4-pointed sparkle (✦) matching the style guide's visual effects
function star5(x, y, r, col, a=1) {
  ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = col;
  ctx.beginPath();
  // Four long points at N/E/S/W, very narrow waist between them
  const outer = r, inner = r * 0.18;
  for (let i = 0; i < 8; i++) {
    const ang = i * Math.PI / 4 - Math.PI / 2;
    const rad = i % 2 === 0 ? outer : inner;
    if (i === 0) ctx.moveTo(x + Math.cos(ang)*rad, y + Math.sin(ang)*rad);
    else          ctx.lineTo(x + Math.cos(ang)*rad, y + Math.sin(ang)*rad);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawHeart(x, y, r, col, a=1, rot=0) {
  ctx.save();
  ctx.globalAlpha = a; ctx.fillStyle = col;
  ctx.translate(x, y); ctx.rotate(rot);
  const w = r;
  ctx.beginPath();
  ctx.moveTo(0, w*0.32);
  ctx.bezierCurveTo(-w*0.5, -w*0.32, -w, w*0.12, 0, w);     // left lobe → bottom point
  ctx.bezierCurveTo(w, w*0.12, w*0.5, -w*0.32, 0, w*0.32);  // right lobe → back to dip
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// Bubbly outlined text — white fill with a berry-red outline, no background needed
function outlineText(text, x, y, size, align='center', fill='#fff', stroke=C.darkRed) {
  ctx.save();
  ctx.font = F(size);
  ctx.textAlign = align; ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round'; ctx.miterLimit = 2;
  ctx.strokeStyle = stroke; ctx.lineWidth = Math.max(3, size * 0.2);
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// Small strawberry icon, drawn with the same outlined styling as the text
function drawBerryIcon(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.lineJoin = 'round';
  // Body — rounded teardrop, point at the bottom
  ctx.beginPath();
  ctx.moveTo(0, s);
  ctx.bezierCurveTo(-s*1.05, s*0.35, -s*0.95, -s*0.55, 0, -s*0.5);
  ctx.bezierCurveTo(s*0.95, -s*0.55, s*1.05, s*0.35, 0, s);
  ctx.closePath();
  ctx.fillStyle = C.red; ctx.strokeStyle = C.darkRed; ctx.lineWidth = Math.max(2, s*0.2);
  ctx.fill(); ctx.stroke();
  // Calyx — three little leaves
  ctx.fillStyle = C.leafMid; ctx.strokeStyle = C.darkGreen; ctx.lineWidth = Math.max(1.5, s*0.14);
  for (let i=-1;i<=1;i++){
    ctx.save(); ctx.rotate(i*0.6); ctx.translate(0,-s*0.55);
    ctx.beginPath();
    ctx.moveTo(0, s*0.18);
    ctx.quadraticCurveTo(-s*0.3, -s*0.1, 0, -s*0.42);
    ctx.quadraticCurveTo(s*0.3, -s*0.1, 0, s*0.18);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// Up-pointing arrow, outlined to match the text styling
function drawArrowUp(cx, cy, s, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.fillStyle = '#fff'; ctx.strokeStyle = C.darkRed; ctx.lineWidth = Math.max(2.5, s*0.22);
  ctx.beginPath();
  ctx.moveTo(0, -s);              // tip
  ctx.lineTo(s*0.8, -s*0.05);
  ctx.lineTo(s*0.32, -s*0.05);
  ctx.lineTo(s*0.32, s);
  ctx.lineTo(-s*0.32, s);
  ctx.lineTo(-s*0.32, -s*0.05);
  ctx.lineTo(-s*0.8, -s*0.05);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function shade(hex, d) {
  const n = parseInt(hex.slice(1),16);
  const clamp = v => Math.max(0,Math.min(255,v));
  const r=clamp((n>>16)+d), g=clamp(((n>>8)&0xff)+d), b=clamp((n&0xff)+d);
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// ─────────────────────────────────────────────
// BACKGROUND
// ─────────────────────────────────────────────
function drawBG() {
  if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
    // Scale image to cover the full virtual canvas (cover = fill, crop if needed)
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const scale = Math.max(VW / iw, VH / ih);
    const dw = iw * scale, dh = ih * scale;
    const dx = (VW - dw) / 2, dy = (VH - dh) / 2;
    ctx.drawImage(bgImg, dx, dy, dw, dh);
  } else {
    // Programmatic fallback while image loads (or if file is missing)
    drawBGFallback();
  }
}

function drawBGFallback() {
  const bg = ctx.createLinearGradient(0,0,0,VH);
  bg.addColorStop(0,   C.nightBg);
  bg.addColorStop(0.42,C.nightBg2);
  bg.addColorStop(0.42,C.wall);
  bg.addColorStop(1,   C.wallDark);
  ctx.fillStyle = bg; ctx.fillRect(0,0,VW,VH);
  drawWindow(); drawStars(); drawMoon(); drawCurtains(); drawBed();
  ctx.fillStyle = '#ead0b0'; ctx.fillRect(0,0,VW,10);
}

function drawWindow() {
  const wx=58, wy=38, ww=274, wh=300;
  // Frame
  ctx.fillStyle = '#3a2560';
  rr(wx-8,wy-8,ww+16,wh+16,14); ctx.fill();
  // Sky
  const sky = ctx.createLinearGradient(wx,wy,wx,wy+wh);
  sky.addColorStop(0,'#080415'); sky.addColorStop(1,'#1a0845');
  rr(wx,wy,ww,wh,8); ctx.fillStyle=sky; ctx.fill();
  // Cross bars
  ctx.fillStyle='#3a2560';
  ctx.fillRect(wx-2, wy+wh/2-4, ww+4, 8);
  ctx.fillRect(wx+ww/2-4, wy-2, 8, wh+4);
}

function drawStars() {
  stars.forEach(s => {
    const tw = 0.45 + 0.55*Math.sin(s.phase + T*s.speed*60);
    ctx.save(); ctx.globalAlpha = tw*0.9;
    ctx.fillStyle='#ffffcc';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawMoon() {
  const mx=VW*0.76, my=88;
  ctx.save();
  ctx.fillStyle='#ffd166';
  ctx.beginPath(); ctx.arc(mx,my,22,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#100430';
  ctx.beginPath(); ctx.arc(mx+11,my-3,18,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCurtains() {
  ctx.save();
  // Left curtain
  ctx.fillStyle=C.pink;
  ctx.beginPath();
  ctx.moveTo(50,30); ctx.lineTo(155,30);
  ctx.quadraticCurveTo(140,100, 120, VH*0.43);
  ctx.lineTo(50, VH*0.43); ctx.closePath(); ctx.fill();
  // Right curtain
  ctx.beginPath();
  ctx.moveTo(340,30); ctx.lineTo(235,30);
  ctx.quadraticCurveTo(250,100, 270, VH*0.43);
  ctx.lineTo(340,VH*0.43); ctx.closePath(); ctx.fill();
  // Polka dots
  ctx.globalAlpha=0.28; ctx.fillStyle='#fff';
  [[68,55],[72,90],[62,125],[80,62],[75,100]].forEach(([px,py]) => {
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
  });
  [[322,55],[318,90],[328,125],[310,62],[315,100]].forEach(([px,py]) => {
    ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawBed() {
  const bx=15, by=VH-128, bw=VW-30, bh=115;
  // Headboard
  ctx.fillStyle='#7c4f2a';
  rr(bx-6,by-18,bw+12,25,10); ctx.fill();
  // Mattress
  ctx.fillStyle='#f0e5d0';
  rr(bx,by,bw,bh,10); ctx.fill();
  // Blanket
  ctx.fillStyle='#c9b1d0';
  rr(bx,by+42,bw,bh-42,10); ctx.fill();
  // Blanket texture stripes
  ctx.fillStyle='rgba(255,255,255,0.18)';
  for(let i=0;i<5;i++){rr(bx+8+i*68,by+48,50,bh-54,6); ctx.fill();}
  // Pillow (decorative)
  ctx.fillStyle='#ffd6e0';
  rr(bx+28,by+8,88,50,14); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)';
  rr(bx+38,by+16,68,8,4); ctx.fill();
}

// ─────────────────────────────────────────────
// STRAWBERRY
// ─────────────────────────────────────────────
function drawBerry(x, y, sx, sy, rot, face, glow) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(rot); ctx.scale(sx, sy);
  const r = berry.r;

  // Glow halo
  if (glow > 0) {
    ctx.save(); ctx.globalAlpha = glow * 0.4;
    const hg = ctx.createRadialGradient(0,0,r*0.5, 0,0,r+22);
    hg.addColorStop(0,'#ff8fab'); hg.addColorStop(1,'rgba(255,100,150,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0,0,r+22,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Drop shadow
  ctx.save(); ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#3a0010';
  ctx.beginPath(); ctx.ellipse(5, r*0.85, r*0.82, r*0.22, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Body: plump round shape slightly pointed at bottom ──
  // Wide oval top, gently tapering to a soft point at bottom
  ctx.beginPath();
  ctx.moveTo(0, r*1.08);                                         // bottom tip
  ctx.bezierCurveTo( r*0.38, r*1.08,  r*0.96, r*0.55,  r*0.96, -r*0.05);
  ctx.bezierCurveTo( r*0.96, -r*0.72, r*0.52, -r*0.92, 0,      -r*0.92);
  ctx.bezierCurveTo(-r*0.52, -r*0.92,-r*0.96, -r*0.72,-r*0.96, -r*0.05);
  ctx.bezierCurveTo(-r*0.96,  r*0.55,-r*0.38,  r*1.08, 0,       r*1.08);
  ctx.closePath();

  // Base fill
  ctx.fillStyle = C.red;
  ctx.fill();

  // Side shading — darker edges for roundness
  ctx.save();
  const sg = ctx.createRadialGradient(r*0.15, -r*0.1, r*0.1, 0, 0, r*1.1);
  sg.addColorStop(0,  'rgba(255,180,180,0.18)');
  sg.addColorStop(0.6,'rgba(0,0,0,0)');
  sg.addColorStop(1,  'rgba(100,0,10,0.38)');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.moveTo(0, r*1.08);
  ctx.bezierCurveTo( r*0.38, r*1.08,  r*0.96, r*0.55,  r*0.96, -r*0.05);
  ctx.bezierCurveTo( r*0.96, -r*0.72, r*0.52, -r*0.92, 0,      -r*0.92);
  ctx.bezierCurveTo(-r*0.52, -r*0.92,-r*0.96, -r*0.72,-r*0.96, -r*0.05);
  ctx.bezierCurveTo(-r*0.96,  r*0.55,-r*0.38,  r*1.08, 0,       r*1.08);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Top highlight blob
  ctx.save(); ctx.globalAlpha = 0.32;
  const hh = ctx.createRadialGradient(-r*0.25,-r*0.35, 0, -r*0.2,-r*0.25, r*0.55);
  hh.addColorStop(0,'#ffcccc'); hh.addColorStop(1,'rgba(255,180,180,0)');
  ctx.fillStyle = hh;
  ctx.beginPath(); ctx.ellipse(-r*0.22,-r*0.28, r*0.42, r*0.52, -0.3, 0, Math.PI*2);
  ctx.fill(); ctx.restore();

  // ── Seeds: cream oval dots ──
  ctx.fillStyle = '#F5E6C8';
  [[-0.16,0.05],[0.24,-0.08],[-0.12,-0.42],[0.34,0.32],
   [-0.40,0.36],[0.08,0.60],[-0.32,-0.06],[0.44,0.08],[0.02,0.26]].forEach(([dx,dy]) => {
    ctx.save(); ctx.translate(dx*r, dy*r); ctx.rotate(0.25);
    ctx.beginPath(); ctx.ellipse(0,0,3,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── Leaves / calyx ──
  drawCalyx(r);

  ctx.restore();
}

// PNG-based berry renderer — falls back to canvas drawBerry if image not ready
function drawBerryPng(x, y, sx, sy, rot, glow, imgKey) {
  const img = berryImgs[imgKey];
  const r = berry.r;
  if (!img || !img.complete || !img.naturalWidth) {
    // Image not loaded yet — use canvas fallback
    drawBerry(x, y, sx, sy, rot, berry.face, glow);
    return;
  }
  ctx.save();
  ctx.translate(x, y); ctx.rotate(rot); ctx.scale(sx, sy);
  if (glow > 0) {
    ctx.save(); ctx.globalAlpha = glow * 0.45;
    const hg = ctx.createRadialGradient(0, 0, r*0.5, 0, 0, r+22);
    hg.addColorStop(0, '#ff8fab'); hg.addColorStop(1, 'rgba(255,100,150,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0, 0, r+22, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.drawImage(img, -r, -r, r*2, r*2);
  ctx.restore();
}

// Five overlapping pointed leaves fanning from the top
function drawCalyx(r) {
  const base = -r * 0.86;
  // Leaf definitions: [angle-offset, length, width-factor]
  const leaves = [
    [-0.65, r*0.72, 0.22],
    [-0.28, r*0.82, 0.24],
    [ 0.05, r*0.80, 0.25],
    [ 0.38, r*0.78, 0.23],
    [ 0.70, r*0.68, 0.20],
  ];
  leaves.forEach(([ao, len, wf]) => {
    ctx.save(); ctx.rotate(ao);
    ctx.fillStyle = C.leafDark;
    ctx.beginPath();
    ctx.moveTo(0, base);
    ctx.bezierCurveTo( r*wf, base - len*0.4,  r*wf*0.5, base - len*0.85, 0, base - len);
    ctx.bezierCurveTo(-r*wf*0.5, base - len*0.85, -r*wf, base - len*0.4, 0, base);
    ctx.closePath(); ctx.fill();
    // Lighter midrib highlight
    ctx.strokeStyle = C.leafMid; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(0, base);
    ctx.quadraticCurveTo(r*wf*0.1, base - len*0.5, 0, base - len);
    ctx.stroke();
    ctx.restore();
  });
  // Green calyx centre knob
  ctx.fillStyle = C.leafMid;
  ctx.beginPath(); ctx.arc(0, base, r*0.14, 0, Math.PI*2); ctx.fill();
  // Tiny stem
  ctx.strokeStyle = C.leafDark; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, base); ctx.lineTo(0, base - r*0.22); ctx.stroke();
}

// Big kawaii eyes matching the style guide
function drawFace(r, f) {
  const eyeY  = -r * 0.08;
  const eyeX  =  r * 0.30;
  const irisR =  r * 0.195;   // large brown iris

  // ── Eyebrows (thin arcs) ──
  ctx.save();
  ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(-eyeX, eyeY - irisR * 1.3, irisR * 1.0, Math.PI + 0.45, Math.PI*2 - 0.45);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc( eyeX, eyeY - irisR * 1.3, irisR * 1.0, Math.PI + 0.45, Math.PI*2 - 0.45);
  ctx.stroke();
  ctx.restore();

  // ── Eyes: draw as separate left/right ──
  [-eyeX, eyeX].forEach(ex => {
    if (f.eo < 0.25) {
      // Sleepy: closed arc (half-moon)
      ctx.save();
      ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(ex, eyeY, irisR, Math.PI, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    } else {
      // White of eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, irisR*1.08, irisR*(0.88 + f.eo*0.12), 0, 0, Math.PI*2); ctx.fill();
      // Brown iris
      ctx.fillStyle = '#6B3A2A';
      ctx.beginPath(); ctx.ellipse(ex, eyeY, irisR*f.eo, irisR*f.eo, 0, 0, Math.PI*2); ctx.fill();
      // Dark pupil
      ctx.fillStyle = '#1a0808';
      ctx.beginPath(); ctx.arc(ex, eyeY, irisR*0.48*f.eo, 0, Math.PI*2); ctx.fill();
      // Main white highlight (upper-right of iris)
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(ex + irisR*0.28, eyeY - irisR*0.30, irisR*0.30, irisR*0.24, -0.4, 0, Math.PI*2); ctx.fill();
      // Secondary tiny sparkle dot
      ctx.beginPath(); ctx.arc(ex - irisR*0.22, eyeY + irisR*0.18, irisR*0.12, 0, Math.PI*2); ctx.fill();
    }
  });

  // ── Mouth ──
  const mouthY = r * 0.42;
  ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (f.sm >= 1.25) {
    // Laughing: open mouth with teeth
    ctx.fillStyle = '#3a1a08';
    ctx.beginPath(); ctx.ellipse(0, mouthY, r*0.26, r*0.16, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(0, mouthY - r*0.02, r*0.21, r*0.09, 0, 0, Math.PI); ctx.fill();
  } else if (f.sm <= 0.55) {
    // Sad/sleepy tiny frown
    ctx.beginPath(); ctx.arc(0, mouthY + r*0.1, r*0.14, Math.PI + 0.35, Math.PI*2 - 0.35); ctx.stroke();
  } else {
    // Happy smile arc
    ctx.beginPath();
    ctx.arc(0, mouthY - r*0.06, r*0.22, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }

  // ── Cheeks ──
  ctx.fillStyle = C.blushPink;
  ctx.save(); ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.ellipse(-eyeX*1.55, mouthY - r*0.05, r*0.20, r*0.11, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( eyeX*1.55, mouthY - r*0.05, r*0.20, r*0.11, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─────────────────────────────────────────────
// GOO STRANDS  — thick dripping shapes like the style guide
// ─────────────────────────────────────────────
function drawGoo() {
  if (state !== S.PLAYING) return;
  const top = berry.y - berry.r * berry.sy * 0.88;

  goo.forEach((s, i) => {
    if (s.broken) {
      const p = Math.min(1, (T - s.bt) / 0.5);
      if (p >= 1) return;
      ctx.save(); ctx.globalAlpha = (1 - p) * 0.85;
      // Upper piece falls back to ceiling, lower piece stays
      const midY = top * 0.45;
      drawGooStrand(s.x, 4,    s.x, midY * (1 - p * 0.6), 8, 3);
      drawGooStrand(s.x, top,  s.x, top - (top - midY) * p * 0.5, 3, 8);
      ctx.restore();
      return;
    }

    const wobble = Math.sin(T * 2.8 + i * 1.7) * 5;
    const bx2 = berry.x + (s.x - berry.bx) * 0.28;
    const strandW = 10 - i * 0.8;   // strands get slightly thinner toward outside
    const dripLen = 14 + Math.sin(T * 1.5 + i) * 4;

    ctx.save();
    // Main filled strand shape
    ctx.fillStyle = C.goo;
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff1a7a';
    drawGooStrand(s.x + wobble * 0.3, 2, bx2 + wobble, top, strandW, strandW * 0.7);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Centre highlight stripe
    ctx.save(); ctx.globalAlpha = 0.30; ctx.fillStyle = '#ffaacc';
    drawGooStrand(s.x + wobble * 0.3 - strandW*0.15, 2,
                  bx2 + wobble - strandW*0.15, top, strandW * 0.32, strandW * 0.2);
    ctx.fill(); ctx.restore();

    // Drip blob at bottom
    ctx.fillStyle = C.goo;
    ctx.beginPath(); ctx.arc(bx2 + wobble, top + dripLen * 0.55, strandW * 0.75, 0, Math.PI*2); ctx.fill();
    // Tiny satellite drip dots
    ctx.save(); ctx.globalAlpha = 0.65;
    ctx.beginPath(); ctx.arc(bx2 + wobble + strandW, top + dripLen * 0.3, strandW * 0.28, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bx2 + wobble - strandW * 0.8, top + dripLen * 0.2, strandW * 0.22, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    ctx.restore();
  });
}

// Draw a filled tapered strand from (x1,y1) to (x2,y2) with given half-widths
function drawGooStrand(x1, y1, x2, y2, w1, w2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy) || 1;
  const nx = -dy / len, ny = dx / len; // normal
  ctx.beginPath();
  ctx.moveTo(x1 + nx*w1, y1 + ny*w1);
  ctx.bezierCurveTo(
    x1 + nx*w1 + dx*0.35, y1 + ny*w1 + dy*0.35,
    x2 + nx*w2 + dx*(-0.1), y2 + ny*w2 + dy*(-0.1),
    x2 + nx*w2, y2 + ny*w2
  );
  ctx.lineTo(x2 - nx*w2, y2 - ny*w2);
  ctx.bezierCurveTo(
    x2 - nx*w2 + dx*(-0.1), y2 - ny*w2 + dy*(-0.1),
    x1 - nx*w1 + dx*0.35,   y1 - ny*w1 + dy*0.35,
    x1 - nx*w1, y1 - ny*w1
  );
  ctx.closePath();
}

// ─────────────────────────────────────────────
// CATCHER DRAWERS
// ─────────────────────────────────────────────
// Draw rects for each catcher type (in translated context where 0,0 = catcher anchor)
// Anchor is the centre of the catch surface — berry lands at y = -catcher.h/2
const CATCHER_RECTS = {
  pillow:   { key:'pillow',    x:-50, y:-22, w:100, h:50 },
  basket:   { key:'basket',    x:-50, y:-37, w:100, h:72 },
  teddy:    { key:'teddybear', x:-50, y:-27, w:100, h:55 },
};

// Auto-sweep the catcher side to side, bouncing off the play-area edges
function moveCatcher() {
  const minX = catcher.w/2 + 8, maxX = VW - catcher.w/2 - 8;
  catcher.x += catcher.vx * dT;
  if (catcher.x <= minX) { catcher.x = minX; catcher.vx =  Math.abs(catcher.vx); }
  else if (catcher.x >= maxX) { catcher.x = maxX; catcher.vx = -Math.abs(catcher.vx); }
}

function drawCatcher() {
  ctx.save();
  ctx.translate(catcher.x, catcher.y + Math.sin(catcher.bounce) * 7);

  const def = CATCHER_RECTS[catcher.type];
  const img = def && catcherImgs[def.key];
  if (img && img.complete && img.naturalWidth) {
    ctx.drawImage(img, def.x, def.y, def.w, def.h);
  } else {
    // Canvas fallback while PNG is loading (or missing)
    if      (catcher.type === 'pillow') drawPillow();
    else if (catcher.type === 'basket') drawBasket();
    else                                drawTeddy();
  }

  ctx.restore();
}

function drawPillow() {
  const hw = catcher.w / 2, hh = catcher.h / 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0, hh + 6, hw * 0.85, 8, 0, 0, Math.PI*2); ctx.fill();

  // Puffy body — slightly inflated by layering two rects
  const puff = 6;
  ctx.fillStyle = '#e8929e';
  rr(-hw - puff, -hh + puff, catcher.w + puff*2, catcher.h, 28); ctx.fill();

  const bg = ctx.createLinearGradient(0, -hh, 0, hh);
  bg.addColorStop(0, '#ffc2cc'); bg.addColorStop(0.5, C.blushPink); bg.addColorStop(1, '#e8929e');
  ctx.fillStyle = bg;
  rr(-hw, -hh, catcher.w, catcher.h, 24); ctx.fill();

  // Lighter centre highlight (puffy centre)
  ctx.save(); ctx.globalAlpha = 0.45;
  const cg = ctx.createRadialGradient(0, -hh*0.2, 0, 0, 0, hw * 0.7);
  cg.addColorStop(0, '#fff0f3'); cg.addColorStop(1, 'rgba(255,230,235,0)');
  ctx.fillStyle = cg;
  rr(-hw + 8, -hh + 5, catcher.w - 16, catcher.h - 10, 18); ctx.fill();
  ctx.restore();

  // Polka dots (cream/white)
  ctx.fillStyle = 'rgba(255,255,255,0.72)';
  [[-38,-8,7],[18,-12,6],[42,4,5],[-14,10,6],[28,12,5],[-50,8,4]].forEach(([dx,dy,dr]) => {
    ctx.beginPath(); ctx.arc(dx, dy, dr, 0, Math.PI*2); ctx.fill();
  });

  // Soft border
  ctx.strokeStyle = '#d4788a'; ctx.lineWidth = 1.5;
  rr(-hw, -hh, catcher.w, catcher.h, 24); ctx.stroke();
}

function drawBasket() {
  const hw = catcher.w / 2, hh = catcher.h / 2;
  const tan = '#C8A97E', dk = '#8B6340', mid = '#A8844E';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0, hh + 5, hw * 0.78, 7, 0, 0, Math.PI*2); ctx.fill();

  // Arched handle
  ctx.save();
  ctx.strokeStyle = dk; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, -hh - 2, hw * 0.58, Math.PI, Math.PI*2);
  ctx.stroke();
  ctx.strokeStyle = mid; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, -hh - 2, hw * 0.58, Math.PI, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // Body — trapezoid
  ctx.fillStyle = tan;
  ctx.beginPath();
  ctx.moveTo(-hw, -hh); ctx.lineTo(hw, -hh);
  ctx.lineTo(hw * 0.84, hh); ctx.lineTo(-hw * 0.84, hh);
  ctx.closePath(); ctx.fill();

  // Wicker weave
  ctx.strokeStyle = dk; ctx.lineWidth = 1.5;
  // Horizontal rails
  for (let row = 1; row <= 3; row++) {
    const ry = -hh + row * (catcher.h / 4);
    const shrink = (row / 4) * (hw - hw * 0.84);
    ctx.beginPath(); ctx.moveTo(-hw + shrink, ry); ctx.lineTo(hw - shrink, ry); ctx.stroke();
  }
  // Diagonal weave lines
  ctx.strokeStyle = mid; ctx.lineWidth = 1;
  for (let col = -5; col <= 5; col++) {
    ctx.beginPath();
    ctx.moveTo(col * (hw / 4.5), -hh);
    ctx.lineTo(col * (hw * 0.84 / 4.5), hh);
    ctx.stroke();
  }

  // Rim
  ctx.fillStyle = mid;
  rr(-hw - 3, -hh - 7, catcher.w + 6, 12, 6); ctx.fill();
  ctx.strokeStyle = dk; ctx.lineWidth = 1.5;
  rr(-hw - 3, -hh - 7, catcher.w + 6, 12, 6); ctx.stroke();

  // Toys peeking out the top
  // Yellow star toy
  ctx.save(); ctx.translate(-hw * 0.35, -hh + 2);
  star5(0, 0, 11, '#FFD166', 1);
  ctx.restore();
  // Small red block
  ctx.fillStyle = '#e63946';
  rr(hw * 0.12, -hh - 2, 16, 14, 3); ctx.fill();
  ctx.fillStyle = '#ffb703';
  rr(hw * 0.14, -hh, 12, 4, 2); ctx.fill();
  // Purple star toy
  ctx.save(); ctx.translate(hw * 0.5, -hh + 3);
  star5(0, 0, 9, C.lavender, 1);
  ctx.restore();
}

function drawTeddy() {
  const sc = catcher.h * 1.6;  // scale — teddy is taller than the hit-box
  const tc = '#C8956C', belly = '#E8C09A', dk = '#8B5E3C';
  const armA = catcher.hug ? -1.0 : 0.32;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0, sc * 0.42, sc * 0.36, 7, 0, 0, Math.PI*2); ctx.fill();

  // ── Arms (draw behind body) ──
  [[-1, 1]].forEach(([side]) => {
    const ax = side * sc * 0.34;
    ctx.save(); ctx.translate(ax, sc * 0.02); ctx.rotate(side * armA);
    ctx.fillStyle = tc;
    ctx.beginPath(); ctx.ellipse(0, sc * 0.14, sc * 0.10, sc * 0.22, 0, 0, Math.PI*2); ctx.fill();
    // Paw
    ctx.fillStyle = belly;
    ctx.beginPath(); ctx.ellipse(0, sc * 0.30, sc * 0.09, sc * 0.08, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
  // Right arm
  ctx.save(); ctx.translate(sc * 0.34, sc * 0.02); ctx.rotate(-armA);
  ctx.fillStyle = tc;
  ctx.beginPath(); ctx.ellipse(0, sc * 0.14, sc * 0.10, sc * 0.22, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = belly;
  ctx.beginPath(); ctx.ellipse(0, sc * 0.30, sc * 0.09, sc * 0.08, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Body ──
  ctx.fillStyle = tc;
  ctx.beginPath(); ctx.ellipse(0, sc * 0.1, sc * 0.32, sc * 0.36, 0, 0, Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle = belly;
  ctx.beginPath(); ctx.ellipse(0, sc * 0.12, sc * 0.20, sc * 0.24, 0, 0, Math.PI*2); ctx.fill();

  // ── Legs / feet ──
  ctx.fillStyle = tc;
  ctx.beginPath(); ctx.ellipse(-sc * 0.16, sc * 0.38, sc * 0.11, sc * 0.09, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( sc * 0.16, sc * 0.38, sc * 0.11, sc * 0.09,  0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = belly;
  ctx.beginPath(); ctx.ellipse(-sc * 0.17, sc * 0.41, sc * 0.08, sc * 0.06, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( sc * 0.17, sc * 0.41, sc * 0.08, sc * 0.06,  0.3, 0, Math.PI*2); ctx.fill();

  // ── Purple bow tie ──
  ctx.save(); ctx.translate(0, -sc * 0.10);
  // Left wing
  ctx.fillStyle = C.purpleBow;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-sc*0.04, -sc*0.05, -sc*0.18, -sc*0.05, -sc*0.18, 0);
  ctx.bezierCurveTo(-sc*0.18, sc*0.05, -sc*0.04, sc*0.05, 0, 0);
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(sc*0.04, -sc*0.05, sc*0.18, -sc*0.05, sc*0.18, 0);
  ctx.bezierCurveTo(sc*0.18, sc*0.05, sc*0.04, sc*0.05, 0, 0);
  ctx.fill();
  // Centre knot
  ctx.fillStyle = shade(C.purpleBow, -30);
  ctx.beginPath(); ctx.ellipse(0, 0, sc*0.04, sc*0.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Head ──
  ctx.fillStyle = tc;
  ctx.beginPath(); ctx.arc(0, -sc * 0.34, sc * 0.24, 0, Math.PI*2); ctx.fill();

  // Ears
  [[-sc*0.19, -sc*0.54], [sc*0.19, -sc*0.54]].forEach(([ex, ey]) => {
    ctx.fillStyle = tc;
    ctx.beginPath(); ctx.arc(ex, ey, sc * 0.10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e8b0a0';
    ctx.beginPath(); ctx.arc(ex, ey, sc * 0.06, 0, Math.PI*2); ctx.fill();
  });

  // Face
  ctx.fillStyle = '#2a0808';
  ctx.beginPath(); ctx.arc(-sc*0.09, -sc*0.37, sc*0.038, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( sc*0.09, -sc*0.37, sc*0.038, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = dk;
  ctx.beginPath(); ctx.ellipse(0, -sc*0.30, sc*0.038, sc*0.028, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = dk; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, -sc*0.26, sc*0.07, 0.25, Math.PI - 0.25); ctx.stroke();
  // Cheeks
  ctx.fillStyle = '#e8b0a0'; ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.ellipse(-sc*0.15, -sc*0.30, sc*0.07, sc*0.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( sc*0.15, -sc*0.30, sc*0.07, sc*0.04, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function spawnJuice(x, y) {
  const cols=['#ff6b9d','#ff8fab','#ffb3c6','#ffa0be','#ff4081'];
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2, sp=1.2+Math.random()*3;
    parts.push({ t:'dot', x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2.2,
      r:3.5+Math.random()*4, col:cols[i%cols.length], life:1, dec:0.026+Math.random()*0.01 });
  }
  const heartCols=['#ff4d94','#ff6b9d','#ff8fab','#e63946'];
  for(let i=0;i<4;i++){
    parts.push({ t:'heart', x:x+(Math.random()-.5)*30, y:y+(Math.random()-.5)*20,
      vx:(Math.random()-.5)*1.6, vy:-1.4-Math.random()*2, r:6+Math.random()*4,
      col:heartCols[i%heartCols.length], life:1, dec:0.02,
      rot:(Math.random()-.5)*0.6, rs:(Math.random()-.5)*0.08 });
  }
}

function spawnConfetti(x, y, n=22) {
  const cols=[C.pink,C.red,C.yellow,C.lavender,C.paleBlue,C.green,C.orange,'#ffffff'];
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI, sp=3+Math.random()*5;
    parts.push({ t:'rect', x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:5+Math.random()*5, col:cols[i%cols.length], life:1,
      dec:0.007+Math.random()*0.005, rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*0.18 });
  }
  // A few hearts mixed into the burst
  const heartCols=['#ff4d94','#ff6b9d','#ff8fab','#e63946'];
  const hn=Math.max(4,Math.round(n*0.3));
  for(let i=0;i<hn;i++){
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI, sp=2.5+Math.random()*4.5;
    parts.push({ t:'heart', x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:7+Math.random()*5, col:heartCols[i%heartCols.length], life:1,
      dec:0.008+Math.random()*0.005, rot:(Math.random()-.5)*0.8, rs:(Math.random()-.5)*0.12 });
  }
}

function spawnStars(x,y) {
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    parts.push({ t:'star5', x:x+Math.cos(a)*28, y:y+Math.sin(a)*28,
      vx:Math.cos(a)*1.6, vy:Math.sin(a)*1.6-1,
      r:8+Math.random()*4, col:C.star, life:1, dec:0.013, rot:0, rs:0 });
  }
}

function updateDrawParticles() {
  parts = parts.filter(p => p.life > 0);
  parts.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life;
    if (p.t==='dot') {
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    } else if (p.t==='star5') {
      star5(p.x,p.y,p.r,p.col,p.life);
    } else if (p.t==='heart') {
      drawHeart(p.x,p.y,p.r,p.col,p.life,p.rot);
    } else if (p.t==='rect') {
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.col; ctx.fillRect(-p.r,-p.r*0.5,p.r*2,p.r); ctx.restore();
    }
    ctx.restore();
    p.x+=p.vx*dT*60; p.y+=p.vy*dT*60;
    p.vy+=0.12*dT*60;
    p.life-=p.dec*dT*60;
    p.r=Math.max(0,p.r-0.04*dT*60);
    if(p.t==='rect'){ p.rot+=p.rs*dT*60; p.vx*=0.99; }
    else if(p.t==='heart'){ p.rot+=p.rs*dT*60; }
  });
}

// iOS-style rounded-square button matching the style guide
function btn(x, y, w, h, label, bg, fg, id, alpha=1) {
  const hw=w/2, hh=h/2;
  // Corner radius ~22% of the smaller dimension (squircle feel)
  const cr = Math.min(w, h) * 0.28;
  ctx.save(); ctx.globalAlpha = alpha;

  // Drop shadow
  ctx.save(); ctx.globalAlpha = alpha * 0.35;
  ctx.fillStyle = '#000';
  rr(x-hw+2, y-hh+5, w, h, cr); ctx.fill();
  ctx.restore();

  // Body gradient (lighter top → darker bottom)
  const g = ctx.createLinearGradient(x, y-hh, x, y+hh);
  g.addColorStop(0,   shade(bg, 28));
  g.addColorStop(0.5, bg);
  g.addColorStop(1,   shade(bg, -30));
  ctx.fillStyle = g;
  rr(x-hw, y-hh, w, h, cr); ctx.fill();

  // Top gloss strip
  ctx.save(); ctx.globalAlpha = alpha * 0.28;
  ctx.fillStyle = '#fff';
  rr(x-hw+4, y-hh+4, w-8, h*0.38, cr*0.8); ctx.fill();
  ctx.restore();

  // Subtle border
  ctx.strokeStyle = shade(bg, -40); ctx.lineWidth = 1.5;
  rr(x-hw, y-hh, w, h, cr); ctx.stroke();

  // Label
  ctx.fillStyle = fg;
  ctx.font = F(22);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Slight text shadow for legibility
  ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
  ctx.fillText(label, x, y);
  ctx.restore();

  uiBtns.push({id, x:x-hw, y:y-hh, w, h});
}

// PNG-based button — drawn centred at (x,y) scaled to targetW, aspect preserved
function imgBtn(key, x, y, targetW, id, alpha=1) {
  const img = uiImgs[key];
  const ar  = (img && img.naturalWidth) ? img.naturalHeight / img.naturalWidth : 0.45;
  const w = targetW, h = targetW * ar;
  if (img && img.complete && img.naturalWidth) {
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.drawImage(img, x - w/2, y - h/2, w, h);
    ctx.restore();
  }
  uiBtns.push({ id, x: x - w/2, y: y - h/2, w, h });
}

function drawStreak() {
  if (streak < 1) return;
  if (streakPop > 0) streakPop = Math.max(0, streakPop - dT);
  const prog = streakPop > 0 ? 1 - streakPop / 0.6 : 1;
  const pop  = 1 + Math.sin(prog * Math.PI) * 0.18;   // brief scale-up on a new catch

  // Bottom-left: strawberry icon + outlined "×N", no background
  const cx = 30, cy = VH - 42;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pop, pop);
  drawBerryIcon(0, 0, 15);
  outlineText('×' + streak, 24, 1, 26, 'left');
  ctx.restore();
}

function audioControls() {
  // Volume toggle (PNG) in the bottom-right corner, above the home-indicator safe area
  const size = 52;
  const cx = VW - size/2 - 14;
  const cy = VH - 40;
  imgBtn(soundOn ? 'volume_on' : 'volume_off', cx, cy, size, 'sound');
}

function hitBtns(tx, ty) {
  for(const b of uiBtns){
    if(tx>=b.x&&tx<=b.x+b.w&&ty>=b.y&&ty<=b.y+b.h){
      doBtn(b.id); return true;
    }
  }
  return false;
}

function doBtn(id) {
  switch(id){
    case 'again':   state=S.TITLE; title.alpha=0; break;
    case 'bedtime': startBedtime(); break;
    case 'replay':  state=S.TITLE; title.alpha=0; break;
    case 'sound':
      soundOn = !soundOn;
      localStorage.setItem('sound', soundOn);
      if (!soundOn) {
        Object.values(audioEl).forEach(e => { try { e.pause(); } catch(e2) {} });
      } else {
        // Only resume song if the game has already started it — otherwise startMusic() will do it
        const song = audioEl['song'];
        if (song && musicStarted) { song.volume = musicVol; song.play().catch(() => {}); }
      }
      break;
  }
}

// ─────────────────────────────────────────────
// THROW ANIMATION  (title → playing transition)
// ─────────────────────────────────────────────
// Stored on the title object to avoid extra globals
// title.tx/ty  — berry position during throw
// title.tvx/tvy — velocity
// title.trot   — rotation
// title.tphase — 'flying' | 'squash'
// title.tsq    — squash timer (frames)

function updateThrow() {
  title.ttime += dT;

  if (title.tphase === 'flying') {
    title.tvy  += 1900 * dT;              // gravity px/s²
    title.tvx  *= Math.pow(0.97, dT*60);
    title.tx   += title.tvx * dT;
    title.ty   += title.tvy * dT;
    title.trot += title.tvx * 0.0006 * dT * 60;

    if (title.ty <= CEIL_Y) {
      // Reached the ceiling — stick!
      title.ty     = CEIL_Y;
      title.tphase = 'squash';
      title.ttime  = 0;
      play('tap_squish');
      spawnJuice(title.tx, title.ty + berry.r);
    } else if (title.ty >= VH - 110) {
      // Too weak to reach the ceiling — fell onto the bed: a missed throw (game over)
      title.ty     = VH - 110;
      title.tx     = Math.max(55, Math.min(VW - 55, title.tx));
      title.tphase = 'missed';
      title.ttime  = 0;
      title.tsx = 1.42; title.tsy = 0.62;   // splat on the bed
      // Carry the splat position onto the berry so bedtime continues from the same spot
      berry.x = title.tx; berry.y = title.ty;
      berry.sx = title.tsx; berry.sy = title.tsy; berry.rot = 0;
      streak = 0;
      play('giggle');
      spawnJuice(title.tx, title.ty + berry.r*0.4);
    }

  } else if (title.tphase === 'missed') {
    // Settle the splat, hold briefly, then drop into the bedtime / play-again screen
    title.tsx += (1 - title.tsx) * Math.min(1, dT*5);
    title.tsy += (1 - title.tsy) * Math.min(1, dT*5);
    if (title.ttime >= 1.2) startBedtime();

  } else if (title.tphase === 'squash') {
    // Damped spring: wide squash → brief stretch → settle
    const p     = Math.min(1, title.ttime / 0.45);
    const decay = 1 - p;
    title.tsx = 1 + 0.50 * decay * Math.cos(p * Math.PI * 3.5);
    title.tsy = 1 - 0.38 * decay * Math.cos(p * Math.PI * 3.5);
    if (p >= 1) newRound(title.tx, title.trot);
  }
}

function drawThrow() {
  drawBG();
  const key = title.tphase === 'missed' ? 'strawberry_tap' : 'strawberry_ceiling';
  drawBerryPng(title.tx, title.ty, title.tsx, title.tsy, title.trot, 0, key);
  updateDrawParticles();
  audioControls();
}

// ─────────────────────────────────────────────
// TITLE SCREEN
// ─────────────────────────────────────────────
function drawTitle() {
  title.alpha = Math.min(1, title.alpha + dT*2);
  title.wp += dT * 1.7;
  ctx.save(); ctx.globalAlpha = title.alpha;

  drawBG();

  // Logo (title + tagline baked in) — gentle bob
  if (logoImg && logoImg.complete && logoImg.naturalWidth) {
    const lw = VW * 0.94;
    const lh = lw * (logoImg.naturalHeight / logoImg.naturalWidth);
    const ly = VH * 0.205 + Math.sin(title.wp * 0.8) * 4;   // vertical centre, soft bob
    ctx.drawImage(logoImg, (VW - lw) / 2, ly - lh / 2, lw, lh);
  } else {
    // Fallback to drawn text if the logo hasn't loaded
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 22; ctx.shadowColor = 'rgba(255,100,130,0.65)';
    ctx.font = F(56);
    ctx.strokeStyle = C.pink; ctx.lineWidth = 7; ctx.lineJoin = 'round';
    ctx.strokeText('Sticky', VW/2, VH*0.145);
    ctx.strokeText('Strawberry', VW/2, VH*0.225);
    ctx.fillStyle = '#fff';
    ctx.fillText('Sticky', VW/2, VH*0.145);
    ctx.fillText('Strawberry', VW/2, VH*0.225);
    ctx.shadowBlur = 0;
    ctx.font = F(18); ctx.fillStyle = '#fff';
    ctx.fillText('When will you fall down?', VW/2, VH*0.295);
  }

  // Best streak (high score)
  if (bestStreak > 0) {
    ctx.save();
    ctx.globalAlpha = title.alpha;
    ctx.font = F(20);
    const label = 'Best  ×' + bestStreak;
    const tw = ctx.measureText(label).width;
    const startX = VW/2 - (tw + 28) / 2;
    drawBerryIcon(startX + 11, VH*0.375, 12);
    outlineText(label, startX + 30, VH*0.375, 20, 'left');
    ctx.restore();
  }

  // Berry position: follows finger while dragging, else gentle float
  let bx, by, bsx = 1, bsy = 1;
  if (titleDrag && inp.pressed) {
    bx  = inp.x; by  = inp.y;
    bsx = 1.12;  bsy = 0.88;   // squash while held
  } else {
    const bp = titleBerryPos();
    bx = bp.x; by = bp.y;
  }
  const wr = Math.sin(title.wp * 1.1) * 0.09;

  // Throw hint — bouncing arrow above berry (hidden while dragging)
  if (!titleDrag) {
    const arrowY = by - berry.r - 30 + Math.sin(T * 3.5) * 8;
    ctx.save();
    ctx.globalAlpha = title.alpha * 0.9;
    drawArrowUp(bx, arrowY, 13);
    ctx.globalAlpha = title.alpha * (0.6 + 0.4 * Math.sin(T * 2.2));
    outlineText('Throw me up!', bx, by + berry.r + 28, 18);
    ctx.restore();
  }

  // Tap pulse — gentle scale-up-and-back when the berry is tapped (not thrown)
  if (title.pulse > 0) {
    title.pulse = Math.max(0, title.pulse - dT);
    const pp = 1 - title.pulse / PULSE_DUR;        // 0 → 1
    const s  = 1 + Math.sin(pp * Math.PI) * 0.16;  // 1 → 1.16 → 1
    bsx *= s; bsy *= s;
  }

  drawBerryPng(bx, by, bsx, bsy, wr, 0, titleDrag ? 'strawberry_ceiling' : 'strawberry_title');

  // Credits — fade in/out with the rest of the title (inherits title.alpha)
  outlineText('Game by Joe Bahar', VW/2, VH*0.905, 14);
  outlineText('Song by Maddie Bahar', VW/2, VH*0.94, 14);

  drawStreak();
  audioControls();
  ctx.restore();
}

// ─────────────────────────────────────────────
// PLAYING STATE
// ─────────────────────────────────────────────
function updatePlaying() {
  // Hangs still on the ceiling; x stays fixed and the wiggle is rotational (see drawPlaying)
  berry.x = berry.bx;
  if (berry.wig > 0) berry.wig -= dT;
  else if (!noAnim && !berry.peeling && Math.random() < dT * 0.4) berry.wig = WIG_DUR;

  // Squash recovery
  if (berry.sqTimer > 0) {
    berry.sqTimer -= dT*60;
    const t=berry.sqTimer/14;
    berry.sx=1+Math.sin(t*Math.PI)*0.28; berry.sy=1-Math.sin(t*Math.PI)*0.22;
  } else {
    berry.sx+=(1-berry.sx)*Math.min(1,dT*9); berry.sy+=(1-berry.sy)*Math.min(1,dT*9);
  }
  berry.glow=Math.max(0,berry.glow-dT*3.5);

  // Slowly drift the lean while peeling off the ceiling
  if(berry.peeling){
    const leanDir = berry.rot >= 0 ? 1 : -1;
    berry.rot += leanDir * dT * 0.18;
  }

  // Catcher sweeps side to side on its own
  moveCatcher();

  // Tap berry
  if(inp.tap){
    const d=Math.hypot(inp.tx-berry.x, inp.ty-berry.y);
    if(d < berry.r*1.9) tapBerry();
  }
}

function tapBerry() {
  if(berry.taps >= berry.need || berry.peeling) return;
  berry.taps++;

  // Break one strand
  const alive=goo.filter(s=>!s.broken);
  if(alive.length>0){ const s=alive[alive.length-1]; s.broken=true; s.bt=T; }

  berry.sx=0.62; berry.sy=1.38; berry.sqTimer=14;
  berry.wig = WIG_DUR;          // little jiggle on each tap
  berry.glow = 0.85;
  spawnJuice(berry.x, berry.y-22);
  play('tap_squish');

  // Penultimate tap — subtle lean to hint it's about to go
  if(berry.taps === berry.need - 1){
    berry.rot = (Math.random() > 0.5 ? 1 : -1) * 0.13;
  }

  if(berry.taps >= berry.need){
    berry.peeling = true;
    berry.wa = 0;            // settle to its column so it drops straight down
    play('sticky_peel');
    setTimeout(() => { beginFall(); }, 700);
  }
}

function beginFall() {
  berry.peeling=false;
  berry.vy=0.6; berry.vx=0; berry.wa=0;   // straight drop — no horizontal drift
  berry.rot=0;
  state=S.FALLING; play('falling_whistle');
}

function drawPlaying() {
  drawBG();
  // One tap left → show the falling graphic as an "about to drop" cue
  const berryKey = berry.taps >= berry.need - 1 ? 'strawberry_falling'
                 : berry.sqTimer > 0            ? 'strawberry_tap'
                 :                                'strawberry_ceiling';
  // Subtle rotational wiggle (decays over WIG_DUR)
  const wigRot = (berry.wig > 0 && !berry.peeling)
    ? Math.sin((WIG_DUR - berry.wig) * 26) * 0.09 * (berry.wig / WIG_DUR)
    : 0;
  drawBerryPng(berry.x,berry.y,berry.sx,berry.sy,berry.rot + wigRot,berry.glow, berryKey);
  drawCatcher();
  updateDrawParticles();
  // Tap hint for first round
  if(round===1 && berry.taps===0){
    const p=0.55+0.45*Math.sin(T*4);
    ctx.save(); ctx.globalAlpha=p;
    outlineText('Tap the strawberry',VW/2,VH*0.32,21);
    outlineText('and catch it below!',VW/2,VH*0.37,21);
    ctx.restore();
  }
  drawStreak();
  audioControls();
}

// ─────────────────────────────────────────────
// FALLING STATE
// ─────────────────────────────────────────────
function updateFalling() {
  berry.vy += 0.42*dT*60;

  // Falls straight down from where it peeled off — x stays fixed
  berry.y+=berry.vy*dT*60;

  // Catcher keeps sweeping — the player must have timed the drop
  moveCatcher();

  // Recovery
  berry.sx+=(1-berry.sx)*Math.min(1,dT*5); berry.sy+=(1-berry.sy)*Math.min(1,dT*5);

  // Check hit floor near catcher
  if(berry.y > catcher.y - catcher.h/2 - berry.r*0.75) doLanding();
}

function doLanding() {
  const dx=Math.abs(berry.x-catcher.x);
  let type;
  if     (dx < catcher.hw/2)    type = catcher.type;
  else if(dx < catcher.hw/2+45) type = 'boop';
  else                           type = 'miss';

  // Streak: a clean catch extends it; anything else ends the run
  const caught = (type === 'pillow' || type === 'basket' || type === 'teddy');
  celeb.record = false;
  if (caught) {
    streak++; streakPop = 0.6;
    if (streak > bestStreak) {
      const hadRecord = bestStreak > 0;
      bestStreak = streak;
      localStorage.setItem('bestStreak', bestStreak);
      // Celebrate the moment a real previous best is first beaten this run
      if (hadRecord && !recordBeaten) { recordBeaten = true; celeb.record = true; }
    }
  } else {
    streak = 0; recordBeaten = false;
  }

  state=S.LANDING; celeb.type=type; celeb.landT=T;
  berry.vx=0; berry.vy=0; berry.rot=0;

  if (caught) {
    berry.sx=1.42; berry.sy=0.62;
    berry.restY = catcher.y-catcher.h/2-berry.r*0.75;   // settled celebration height
    berry.y = berry.restY; berry.x = catcher.x;
    catcher.bounce=Math.PI;
    if(type==='teddy') catcher.hug=true;
    spawnConfetti(berry.x,berry.y,26);
  } else if (type==='boop') {
    // Grazed the edge → flip off the side so it's clearly a miss
    berry.sx=1; berry.sy=1;
    berry.y = catcher.y - catcher.h/2 - berry.r*0.5;
    const dir = (berry.x >= catcher.x) ? 1 : -1;
    berry.x = catcher.x + dir * (catcher.hw/2);
    berry.vx = dir * 6;
    berry.vy = -3.5;
    catcher.bounce = Math.PI*0.6;
    spawnJuice(berry.x, berry.y);
  } else { // miss — straight onto the floor
    berry.sx=1.42; berry.sy=0.62;
    berry.y=VH-102; berry.x=Math.max(55,Math.min(VW-55,berry.x));
    spawnJuice(berry.x, berry.y-10);
  }

  const snd={pillow:'pillow_bounce',basket:'basket_pop',teddy:'teddy_hug',boop:'head_boop',miss:'giggle'};
  play(snd[type]||'giggle');
  if (caught) play('catch_chime');   // happy ascending chime layered on the catch
  if (celeb.record) { play('record_fanfare'); spawnConfetti(VW/2, VH*0.34, 40); }

  if (caught) {
    // Celebration screen persists — the player grabs the berry and throws again to continue
    setTimeout(()=>{ state=S.CELEBRATION; }, 900);
  } else {
    // Missed — game over: drop into the bedtime / play-again screen
    setTimeout(()=>{ startBedtime(); }, 1300);
  }
}

function drawFalling() {
  drawBG();
  drawBerryPng(berry.x,berry.y,berry.sx,berry.sy,berry.rot,0,'strawberry_falling');
  drawCatcher(); updateDrawParticles(); drawStreak(); audioControls();
}

// ─────────────────────────────────────────────
// LANDING (brief transition)
// ─────────────────────────────────────────────
function updateLanding() {
  if (celeb.type === 'boop') {
    // Tumble off the side of the catcher
    berry.vy += 0.5*dT*60;
    berry.x  += berry.vx*dT*60;
    berry.y  += berry.vy*dT*60;
    berry.rot += berry.vx*0.03*dT*60;
    catcher.bounce=Math.max(0,catcher.bounce-dT*5);
    return;
  }
  berry.sx+=(1-berry.sx)*Math.min(1,dT*4.5); berry.sy+=(1-berry.sy)*Math.min(1,dT*4.5);
  catcher.bounce=Math.max(0,catcher.bounce-dT*5);

  // Clean catch: plunge a little deeper into the catcher, then spring back up to rest
  const caught = (celeb.type==='pillow'||celeb.type==='basket'||celeb.type==='teddy');
  if (caught && berry.restY !== undefined) {
    const p = Math.min(1, (T - celeb.landT) / 0.5);
    const decay = 1 - p;
    berry.y = berry.restY + 20 * decay * Math.sin(p * Math.PI * 2);   // dip down, then rebound
  }
}

function drawLanding() {
  drawBG(); drawCatcher();
  const caught = (celeb.type==='pillow'||celeb.type==='basket'||celeb.type==='teddy');
  // Win → celebration graphic (brief squish on impact first); lose → squished tap graphic
  let key;
  if (caught) key = (T - celeb.landT) < 0.18 ? 'strawberry_tap' : 'strawberry_celebration';
  else        key = 'strawberry_tap';
  drawBerryPng(berry.x,berry.y,berry.sx,berry.sy,berry.rot, caught?0.45:0, key);
  updateDrawParticles(); drawStreak(); audioControls();
}

// ─────────────────────────────────────────────
// CELEBRATION
// ─────────────────────────────────────────────
function celebMsg(t) {
  return {
    pillow:  'Soft landing! Yay!',
    basket:  'In the basket! Hooray!',
    teddy:   'Teddy hug! So sweet!',
    boop:    'Boop! Hee hee hee!',
    miss:    'Sweet dreams, strawberry!',
  }[t]||'Wonderful!';
}

function updateCelebration() {
  berry.sx+=(1-berry.sx)*Math.min(1,dT*3); berry.sy+=(1-berry.sy)*Math.min(1,dT*3);
  catcher.bounce=Math.max(0,catcher.bounce-dT*3);
}

function drawCelebration() {
  drawBG(); drawCatcher();

  // Berry stays where it was caught; follows the finger while being grabbed to throw again
  let bx, by, bsx = berry.sx, bsy = berry.sy;
  if (titleDrag && inp.pressed) { bx = inp.x; by = inp.y; bsx = 1.12; bsy = 0.88; }
  else { bx = berry.x; by = berry.y; }

  // Tap pulse
  if (title.pulse > 0) {
    title.pulse = Math.max(0, title.pulse - dT);
    const s = 1 + Math.sin((1 - title.pulse / PULSE_DUR) * Math.PI) * 0.16;
    bsx *= s; bsy *= s;
  }

  drawBerryPng(bx, by, bsx, bsy, 0, 0.28+0.18*Math.sin(T*3), 'strawberry_celebration');
  updateDrawParticles();

  // New-high-score banner (pulses) sits above the catch message
  if (celeb.record) {
    const s = 1 + Math.sin(T * 6) * 0.07;
    ctx.save();
    ctx.translate(VW/2, VH*0.32); ctx.scale(s, s);
    outlineText('NEW HIGH SCORE!', 0, 0, 26, 'center', C.yellow, C.darkRed);
    ctx.restore();
  }

  outlineText(celebMsg(celeb.type), VW/2, VH*0.40, 24);

  // "Throw again" hint on the berry (hidden while being grabbed)
  if (!titleDrag) {
    const arrowY = by - berry.r - 30 + Math.sin(T * 3.5) * 8;
    ctx.save();
    ctx.globalAlpha = 0.9;
    drawArrowUp(bx, arrowY, 13);
    ctx.globalAlpha = 0.6 + 0.4 * Math.sin(T * 2.2);
    outlineText('Throw again!', bx, by + berry.r + 28, 18);
    ctx.restore();
  }

  drawStreak();
  audioControls();
}

// ─────────────────────────────────────────────
// BEDTIME
// ─────────────────────────────────────────────
function startBedtime() {
  state=S.BEDTIME;
  streak=0; recordBeaten=false;   // fresh start after the lullaby ending
  bed.dim=0; bed.going=true;
  berry.face={eo:0.12,sm:0.55};
  // Keep the strawberry where it landed — just settle it upright and on-screen
  berry.x = Math.max(45, Math.min(VW-45, berry.x));
  berry.y = Math.min(VH-92, Math.max(VH-170, berry.y));
  berry.rot=0; berry.sx=1; berry.sy=1;
  play('bedtime_chime');
}

function updateBedtime() {
  if(bed.going) bed.dim=Math.min(0.88,bed.dim+dT*0.38);
  // Gentle Zzz particles
  if(Math.random()<0.018 && !noAnim){
    parts.push({t:'star5',x:berry.x+28+Math.random()*18,y:berry.y-berry.r,
      vx:0.3+Math.random()*0.5,vy:-0.7-Math.random()*0.5,r:7,col:C.lavender,life:1,dec:0.009,rot:0,rs:0});
  }
}

function drawBedtime() {
  drawBG();
  drawCatcher();   // keep the catcher where it was while the room dims

  // Keep the strawberry as it landed while the room dims
  drawBerryPng(berry.x,berry.y,berry.sx,berry.sy,berry.rot,0,'strawberry_tap');
  updateDrawParticles();

  // Dim overlay
  ctx.save(); ctx.fillStyle=`rgba(8,4,18,${bed.dim})`; ctx.fillRect(0,0,VW,VH); ctx.restore();

  // Stars in sky during bedtime
  if(bed.dim>0.25){
    const a=(bed.dim-0.25)/0.63;
    for(let i=0;i<16;i++){
      const sx=35+(i*53)%(VW-70), sy=28+(i*37)%(VH*0.28);
      const tw=0.45+0.55*Math.sin(T*2+i);
      star5(sx,sy,5+(i%3)*2,C.star,Math.min(1,a)*tw);
    }
  }

  // Goodnight text
  if(bed.dim>0.52){
    const a=Math.min(1,(bed.dim-0.52)/0.3);
    ctx.save(); ctx.globalAlpha=a;
    outlineText('Goodnight,',VW/2,VH*0.22,34);
    const t='Sticky Strawberry';
    outlineText(t,VW/2,VH*0.30,34);
    ctx.font=F(34);
    drawBerryIcon(VW/2 + ctx.measureText(t).width/2 + 22, VH*0.30, 15);
    ctx.restore();
  }

  // Polaroid snapshot
  if(bed.dim > 0.62){
    const a      = Math.min(1, (bed.dim - 0.62) / 0.22);
    const keys   = ['snapshot_1','snapshot_2','snapshot_3'];
    const tilts  = [-0.06, 0.05, -0.04];
    const idx    = Math.floor(T / 3) % 3;
    const img    = snapImgs[keys[idx]];
    // Smooth cross-fade at each 3-second transition
    const cycleT = T % 3;
    const fade   = cycleT < 0.35 ? cycleT/0.35 : cycleT > 2.65 ? (3-cycleT)/0.35 : 1;

    // Landscape polaroid — image area 230×161 (≈3:2), 14px border, 64px bottom
    const iw = 230, ih = 161, pad = 14, bot = 64;
    const pw = iw + pad*2;          // 258
    const ph = ih + pad + bot;      // 239
    const cx = VW/2, cy = VH*0.535;

    ctx.save();
    ctx.globalAlpha = a * fade;
    ctx.translate(cx, cy);
    ctx.rotate(tilts[idx]);

    // Drop shadow
    ctx.shadowBlur = 24; ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowOffsetY = 6;
    ctx.fillStyle = '#fff';
    rr(-pw/2, -ph/2, pw, ph, 3); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    // Photo — "cover" crop to fill the image area regardless of source aspect ratio
    if(img && img.complete && img.naturalWidth){
      const dx = -pw/2 + pad, dy = -ph/2 + pad;
      const srcR = img.naturalWidth / img.naturalHeight;
      const dstR = iw / ih;
      let sx, sy, sw, sh;
      if(srcR > dstR){
        sh = img.naturalHeight; sw = sh * dstR;
        sx = (img.naturalWidth - sw) / 2; sy = 0;
      } else {
        sw = img.naturalWidth; sh = sw / dstR;
        sx = 0; sy = (img.naturalHeight - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, dx, dy, iw, ih);
    } else {
      // Placeholder while image loads
      ctx.fillStyle = '#f0e8e8';
      ctx.fillRect(-pw/2 + pad, -ph/2 + pad, iw, ih);
    }

    // Handwritten caption in the bottom white section
    const captions = ['Daddy\'s little princess', 'Sleeping like bunnies', 'Fun times with Mama'];
    const captionY = -ph/2 + pad + ih + bot/2;
    ctx.fillStyle = '#444';
    ctx.font = `600 18px "Caveat", cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(captions[idx], 0, captionY);

    ctx.restore();
  }

  // Replay button
  if(bed.dim>0.72){
    const a=Math.min(1,(bed.dim-0.72)/0.16);
    imgBtn('btn_again',VW/2,VH*0.76,150,'replay',a);
  }
  audioControls();
}

// ─────────────────────────────────────────────
// SING-ALONG OVERLAY
// ─────────────────────────────────────────────
function drawSingAlong() {
  if(!sing.on || sing.line<0) return;
  const line=LYRICS[sing.line]; if(!line) return;
  const p=0.82+0.18*Math.sin(T*4);
  ctx.save(); ctx.globalAlpha=p;
  outlineText(line, VW/2, VH*0.725+27, 20);
  ctx.restore();
}

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function loop(ts) {
  dT = Math.min(0.05,(ts-lastTs)/1000);
  lastTs=ts; T+=dT;
  uiBtns=[];

  ctx.save(); ctx.scale(scale,scale);

  switch(state){
    case S.TITLE:        drawTitle();                         break;
    case S.THROWING:     updateThrow(); drawThrow();          break;
    case S.PLAYING:      updatePlaying();    drawPlaying();       drawSingAlong(); break;
    case S.FALLING:      updateFalling();    drawFalling();       drawSingAlong(); break;
    case S.LANDING:      updateLanding();    drawLanding();                        break;
    case S.CELEBRATION:  updateCelebration();drawCelebration();   drawSingAlong(); break;
    case S.BEDTIME:      updateBedtime();    drawBedtime();                        break;
  }

  ctx.restore();

  // Process taps (after draw so buttons are registered)
  if(inp.tap){ hitBtns(inp.tx,inp.ty); inp.tap=false; }

  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
initStars();
requestAnimationFrame(ts => { lastTs=ts; requestAnimationFrame(loop); });

// ─────────────────────────────────────────────
// SERVICE WORKER REGISTRATION
// ─────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
